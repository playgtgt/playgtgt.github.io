<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        /* This approximates the Grobold look */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .box { 
            background: rgba(20, 20, 20, 0.9); 
            border: 3px solid #555; 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%;
            max-width: 500px; 
            box-shadow: 0 20px 60px rgba(0,0,0,1); 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { 
            /* Grobold style: Bold, Rounded, Golden Gradient */
            font-family: 'Fredoka One', cursive; 
            font-size: 5rem; 
            margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff700 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 0px #000); /* The classic GT black outline */
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .hosts-container { 
            background: #000; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px dashed #ffcc00; 
            margin-bottom: 25px; 
            text-align: left; 
        }

        code { 
            color: #00ff00; 
            font-family: monospace; 
            font-size: 0.9rem; 
            display: block;
            white-space: pre;
        }

        .btn { 
            background: #5865F2; /* Official Discord Blue */
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Space between logo and text */
            transition: 0.2s; 
            font-size: 1.2rem;
        }

        .btn:hover { 
            background: #4752c4; 
            transform: scale(1.03); 
        }

        /* The Discord SVG Logo */
        .discord-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>GTGT</h1>
        <p>Growtopia Private Server that feels like real Growtopia... but better!</p>
