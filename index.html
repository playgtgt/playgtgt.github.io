<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        body { 
            /* This fills the screen with your image */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensures it takes up the full height of the screen */
        }

        .box { 
            background: rgba(20, 20, 20, 0.9); 
            border: 2px solid #00ff00; 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%;
            max-width: 500px; 
            box-shadow: 0 20px 60px rgba(0,0,0,1); 
            text-align: center;
            z-index: 10; /* Keeps it on top of the background */
        }

        h1 { 
            color: #00ff00; 
            text-shadow: 3px 3px #000; 
            font-size: 3.5rem; 
            margin: 0 0 10px 0; 
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .hosts-container { 
            background: #000; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px dashed #00ff00; 
            margin-bottom: 25px; 
            text-align: left; 
        }

        code { 
            color: #00ff00; 
            font-family: monospace; 
            font-size: 0.9rem; 
            display: block;
            white-space: pre;
        }

        .btn { 
            background: #7289da; 
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            display: block; 
            transition: 0.2s; 
        }

        .btn:hover { 
            background: #5b6eae; 
            transform: scale(1.02); 
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>GTGT</h1>
        <p>Growtopia Private Server that feels like real Growtopia... but better!</p>
        
        <div class="hosts-container">
            <code>91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com</code>
        </div>

        <a href="https://discord.gg/qkaVBCUrna" class="btn">Join our Discord server!</a>
    </div>

    <div class="footer">&copy; 2026 GTGT Team</div>

</body>
</html>
