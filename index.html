<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -15px, 0); } }
        @keyframes goldGlow { 
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
            50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
        }
        @keyframes boxPulse {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.15), 0 30px 60px rgba(0,0,0,0.5); border-color: rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.35), 0 30px 60px rgba(0,0,0,0.5); border-color: rgba(255, 215, 0, 0.6); }
        }
        @keyframes drift {
            from { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .box { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 215, 0, 0.3); padding: 50px 45px; border-radius: 50px; 
            width: 95%; max-width: 480px; text-align: center; backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px); animation: float 6s ease-in-out infinite, boxPulse 4s ease-in-out infinite;
        }

        .live-counter {
            font-family: 'Fredoka One', cursive; font-size: 0.95rem; margin-bottom: -2px;
            background: linear-gradient(to bottom, #fff700, #ffcc00); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3)); 
            letter-spacing: 2px; text-transform: uppercase; opacity: 0.9;
        }

        h1 { 
            font-family: 'Fredoka One', cursive; font-size: 6rem; margin: 0;
            background: linear-gradient(to bottom, #fff700 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: goldGlow 3s ease-in-out infinite; line-height: 1;
        }

        .subtitle { font-size: 1.05rem; color: rgba(255,255,255,0.75); margin: 15px 0 30px 0; }

        .tab-bar { display: flex; justify-content: center; gap: 10px; margin: 25px 0 15px 0; }
        .tab {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.2);
            color: rgba(255,255,255,0.6); padding: 10px 15px; border-radius: 15px;
            font-size: 0.8rem; cursor: pointer; transition: 0.3s; font-weight: 600; flex: 1;
        }
        .tab.active { background: rgba(255,215,0,0.2); border-color: #ffd700; color: #ffd700; }

        .display-area { min-height: 140px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; }
        
        .hosts-wrapper { position: relative; width: 100%; }
        .hosts-container { background: rgba(0, 0, 0, 0.65); padding: 22px; border-radius: 25px; border: 1px solid rgba(255, 215, 0, 0.15); text-align: left; }
        
        code { 
            color: #ffd700; font-family: 'Courier New', monospace; 
            font-size: 0.9rem; line-height: 1.6; display: block; white-space: pre; 
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.2));
        }

        .copy-btn {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255, 215, 0, 0.15); border: 1px solid rgba(255, 215, 0, 0.35);
            color: #ffd700; padding: 6px 14px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; transition: 0.3s;
        }

        .dl-btn {
            background: linear-gradient(45deg, #ffd700, #ffa500); color: black;
            padding: 22px 0; border-radius: 25px; text-decoration: none; font-weight: 800;
            font-size: 1.2rem; display: none; width: 100%; box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            transition: 0.3s; text-align: center;
        }
        .dl-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* --- Updated Buttons with Icons --- */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            padding: 18px; text-decoration: none; border-radius: 50px; 
            font-weight: 600; display: flex; align-items: center; justify-content: center; 
            gap: 12px; transition: 0.3s ease; font-size: 1.05rem; 
        }
        .btn-discord { background: #5865F2; color: white; }
        .btn-tutorial { background: rgba(255, 215, 0, 0.05); border: 2px solid rgba(255, 215, 0, 0.4); color: #ffd700; }
        .btn:hover { transform: scale(1.03); }

        .footer { margin-top: 35px; font-size: 0.75rem; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 1px; }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.4); border-radius: 50%; animation: drift linear infinite; }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="box">
        <div class="live-counter" id="playerCountText">ONLINE PLAYERS: 0</div>
        <h1>GTGT</h1>
        <p class="subtitle">The Growtopia experience, evolved.</p>
        
        <div class="tab-bar">
            <div class="tab active" onclick="switchMode('pc', this)">WINDOWS</div>
            <div class="tab" onclick="switchMode('android', this)">ANDROID</div>
            <div class="tab" onclick="switchMode('ios', this)">iOS</div>
        </div>

        <div class="display-area">
            <div id="pcSection" class="hosts-wrapper">
                <button class="copy-btn" onclick="copyHosts()">Copy</button>
                <div class="hosts-container">
                    <code id="hostCode">91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com</code>
                </div>
            </div>

            <a id="androidBtn" href="https://dash.gtps.cloud/android/50" target="_blank" class="dl-btn">GET HOSTS (ANDROID)</a>
            <a id="iosBtn" href="https://dash.gtps.cloud/ios/50" target="_blank" class="dl-btn">GET HOSTS (iOS)</a>
        </div>

        <div class="btn-group">
            <a href="https://discord.gg/qkaVBCUrna" target="_blank" class="btn btn-discord">
                <svg style="width:24px;height:24px;fill:white" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.39,80.21a105.73,105.73,0,0,0,32.17,16.15,77.7,77.7,0,0,0,6.89-11.11,68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14c2.64-27.38-4.52-51.06-19.73-72.13ZM42.48,65.69c-6.3,0-11.48-5.78-11.48-12.89S36.1,39.9,42.48,39.9s11.48,5.78,11.48,12.89S48.86,65.69,42.48,65.69Zm42.24,0c-6.3,0-11.48-5.78-11.48-12.89S78.34,39.9,84.72,39.9s11.48,5.78,11.48,12.89S91.1,65.69,84.72,65.69Z"/></svg>
                Join Discord
            </a>
            <a href="https://discord.gg/WNr99UZtSe" target="_blank" class="btn btn-tutorial">
                <svg style="width:24px;height:24px;fill:currentColor" viewBox="0 0 24 24"><path d="M11,18H13V16H11V18M12,2A10,10,0,0,0,2,12A10,10,0,0,0,12,22A10,10,0,0,0,22,12A10,10,0,0,0,12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,6A4,4,0,0,0,8,10H10A2,2,0,0,1,12,8A2,2,0,0,1,14,10C14,12 11,11.75 11,15H13C13,12.75 16,12.5 16,10A4,4,0,0,0,12,6Z"/></svg>
                How To Join
            </a>
        </div>
    </div>

    <div class="footer">DEVELOPED BY GTGT TEAM &copy; 2026</div>

    <script>
        const discordID = '1388213237023244449';

        function switchMode(device, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('pcSection').style.display = 'none';
            document.getElementById('androidBtn').style.display = 'none';
            document.getElementById('iosBtn').style.display = 'none';
            if(device === 'pc') document.getElementById('pcSection').style.display = 'block';
            else if(device === 'android') document.getElementById('androidBtn').style.display = 'block';
            else document.getElementById('iosBtn').style.display = 'block';
        }

        async function updatePlayerCount() {
            try {
                const response = await fetch(`https://discord.com/api/guilds/${discordID}/widget.json`);
                const data = await response.json();
                document.getElementById('playerCountText').innerText = `ONLINE PLAYERS: ${data.presence_count}`;
            } catch (e) { }
        }

        updatePlayerCount();
        setInterval(updatePlayerCount, 30000);

        function copyHosts() {
            const text = document.getElementById('hostCode').innerText;
            const btn = document.querySelector('.copy-btn');
            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = 'Copied!';
                setTimeout(() => { btn.innerText = 'Copy'; }, 2000);
            });
        }

        const container = document.getElementById('particle-container');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 6 + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
