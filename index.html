<!DOCTYPE html>
<html>
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -15px, 0); } }
        @keyframes goldGlow { 
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
            50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)) drop-shadow(4px 4px 0px rgba(0,0,0,0.6)); } 
        }

        /* --- Top Navigation --- */
        .nav-container { position: absolute; top: 30px; right: 40px; z-index: 100; }
        .tutorial-trigger {
            background: rgba(255, 215, 0, 0.1); border: 2px solid #ffd700; color: #ffd700;
            padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 700;
            font-size: 0.9rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .tutorial-trigger:hover { background: #ffd700; color: black; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        /* --- Main Box --- */
        .box { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.12); 
            border: 1px solid rgba(255, 215, 0, 0.3); padding: 50px 45px; border-radius: 50px; 
            width: 95%; max-width: 480px; text-align: center; backdrop-filter: blur(18px); 
            -webkit-backdrop-filter: blur(18px); animation: float 6s ease-in-out infinite;
        }

        h1 { font-family: 'Fredoka One', cursive; font-size: 6rem; margin: 0; background: linear-gradient(to bottom, #fff700, #ff9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldGlow 3s ease-in-out infinite; line-height: 1; }
        .live-counter { font-family: 'Fredoka One', cursive; font-size: 0.95rem; color: #ffd700; letter-spacing: 2px; }

        /* --- Tutorial Overlay --- */
        #tutorialOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }

        .modal { width: 90%; max-width: 600px; text-align: center; color: white; }
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 2rem; color: #ffd700; cursor: pointer; }

        .selector-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .pill { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.3);
            padding: 8px 18px; border-radius: 50px; cursor: pointer; color: white; font-size: 0.85rem; transition: 0.3s;
        }
        .pill.active { background: #ffd700; color: black; font-weight: 700; }

        .tutorial-content {
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2); text-align: left; min-height: 300px; margin-top: 20px;
        }
        .tutorial-text { font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.9); }
        .tutorial-text b { color: #ffd700; }
        .tutorial-text code { background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 5px; color: #fff700; }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.4); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(0); opacity: 0; } to { transform: translateY(-110vh); opacity: 0; } }

        .btn { padding: 18px; text-decoration: none; border-radius: 50px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s ease; margin-top: 15px; }
        .btn-discord { background: #5865F2; color: white; }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="nav-container">
        <button class="tutorial-trigger" onclick="toggleTutorial(true)">
            <svg style="width:20px;height:20px;fill:currentColor" viewBox="0 0 24 24"><path d="M11,18H13V16H11V18M12,2A10,10,0,0,0,2,12A10,10,0,0,0,12,22A10,10,0,0,0,22,12A10,10,0,0,0,12,2M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,6A4,4,0,0,0,8,10H10A2,2,0,0,1,12,8A2,2,0,0,1,14,10C14,12 11,11.75 11,15H13C13,12.75 16,12.5 16,10A4,4,0,0,0,12,6Z"/></svg>
            How To Join
        </button>
    </div>

    <div class="box">
        <div class="live-counter" id="playerCountText">ONLINE PLAYERS: 0</div>
        <h1>GTGT</h1>
        <p style="color:rgba(255,255,255,0.6)">Connect to the most advanced private server.</p>
        <a href="https://discord.gg/qkaVBCUrna" target="_blank" class="btn btn-discord">Join Community Discord</a>
    </div>

    <div id="tutorialOverlay">
        <span class="close-btn" onclick="toggleTutorial(false)">&times;</span>
        <div class="modal">
            <h2 style="font-family:'Fredoka One'; font-size: 2.5rem; color:#ffd700; margin-bottom:10px;">Setup Guide</h2>
            
            <p style="margin-bottom: 5px; font-weight: 600;">1. Select Language</p>
            <div class="selector-group">
                <div class="pill lang-pill active" onclick="setLang('en', this)">🇺🇸 English</div>
                <div class="pill lang-pill" onclick="setLang('id', this)">🇮🇩 Indonesian</div>
                <div class="pill lang-pill" onclick="setLang('lt', this)">🇱🇹 Lithuanian</div>
                <div class="pill lang-pill" onclick="setLang('ru', this)">🇷🇺 Russian</div>
            </div>

            <p style="margin-bottom: 5px; font-weight: 600;">2. Select Device</p>
            <div class="selector-group">
                <div class="pill dev-pill active" onclick="setDev('pc', this)">💻 Windows</div>
                <div class="pill dev-pill" onclick="setDev('android', this)">🤖 Android</div>
                <div class="pill dev-pill" onclick="setDev('ios', this)">🍎 iOS</div>
            </div>

            <div class="tutorial-content">
                <div id="tutorialBody" class="tutorial-text">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let currentDev = 'pc';

        const tutorials = {
            en: {
                pc: "<b>Step 1:</b> Press <code>Win+R</code> and paste: <code>C:\\Windows\\System32\\drivers\\etc</code><br><b>Step 2:</b> Open <b>hosts</b> file with Notepad.<br><b>Step 3:</b> Paste our IP lines at the very bottom and Save (Ctrl+S).",
                android: "<b>Step 1:</b> Download <a href='https://github.com/krlvm/PowerTunnel-Android/releases/download/v2.6.3/PowerTunnel.apk' style='color:#ffd700'>PowerTunnel</a>.<br><b>Step 2:</b> Go to Plugins -> Hosts Settings.<br><b>Step 3:</b> Set URL to <code>https://bit.ly/GTGTps</code> (Android Tab) and Connect.",
                ios: "<b>Step 1:</b> Download <a href='#' style='color:#ffd700'>Surge 5</a> from App Store.<br><b>Step 2:</b> Create 'New Empty Profile' named GTGT.<br><b>Step 3:</b> Select Edit in Text Mode, paste the text from our website (iOS Tab), and Start."
            },
            id: {
                pc: "<b>Langkah 1:</b> Tekan <code>Win+R</code> dan tempel: <code>C:\\Windows\\System32\\drivers\\etc</code><br><b>Langkah 2:</b> Buka file <b>hosts</b> dengan Notepad.<br><b>Langkah 3:</b> Tempel IP kami di bagian paling bawah dan Simpan (Ctrl+S).",
                android: "<b>Langkah 1:</b> Unduh PowerTunnel.<br><b>Langkah 2:</b> Pergi ke Plugins -> Hosts Settings.<br><b>Langkah 3:</b> Masukkan URL <code>https://bit.ly/GTGTps</code> dan hubungkan.",
                ios: "<b>Langkah 1:</b> Unduh Surge 5.<br><b>Langkah 2:</b> Buat profil baru bernama GTGT.<br><b>Langkah 3:</b> Edit dalam mode teks, tempel konfigurasi, dan aktifkan."
            },
            lt: {
                pc: "<b>1 Žingsnis:</b> Paspauskite <code>Win+R</code> ir įrašykite: <code>C:\\Windows\\System32\\drivers\\etc</code><br><b>2 Žingsnis:</b> Atidarykite <b>hosts</b> failą su Notepad.<br><b>3 Žingsnis:</b> Įklijuokite IP eilutes apačioje ir Išsaugokite (Ctrl+S).",
                android: "<b>1 Žingsnis:</b> Atsisiųskite PowerTunnel.<br><b>2 Žingsnis:</b> Eikite į Plugins -> Hosts Settings.<br><b>3 Žingsnis:</b> Įveskite URL <code>https://bit.ly/GTGTps</code> ir prisijunkite.",
                ios: "<b>1 Žingsnis:</b> Atsisiųskite Surge 5.<br><b>2 Žingsnis:</b> Sukurkite naują profilį GTGT.<br><b>3 Žingsnis:</b> Įklijuokite nustatymus teksto režimu ir paleiskite."
            },
            ru: {
                pc: "<b>Шаг 1:</b> Нажмите <code>Win+R</code> и вставьте: <code>C:\\Windows\\System32\\drivers\\etc</code><br><b>Шаг 2:</b> Откройте файл <b>hosts</b> через Блокнот.<br><b>Шаг 3:</b> Вставьте наши IP-строки в самый низ и сохраните (Ctrl+S).",
                android: "<b>Шаг 1:</b> Скачайте PowerTunnel.<br><b>Шаг 2:</b> Зайдите в Плагины -> Настройки Hosts.<br><b>Шаг 3:</b> Вставьте URL <code>https://bit.ly/GTGTps</code> и подключитесь.",
                ios: "<b>Шаг 1:</b> Установите Surge 5.<br><b>Шаг 2:</b> Создайте пустой профиль GTGT.<br><b>Шаг 3:</b> Отредактируйте в текстовом режиме, вставьте конфиг и запустите."
            }
        };

        function updateTutorial() {
            document.getElementById('tutorialBody').innerHTML = tutorials[currentLang][currentDev];
        }

        function setLang(lang, el) {
            currentLang = lang;
            document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            updateTutorial();
        }

        function setDev(dev, el) {
            currentDev = dev;
            document.querySelectorAll('.dev-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            updateTutorial();
        }

        function toggleTutorial(show) {
            const over = document.getElementById('tutorialOverlay');
            if(show) {
                over.style.display = 'flex';
                setTimeout(() => over.style.opacity = '1', 10);
                updateTutorial();
            } else {
                over.style.opacity = '0';
                setTimeout(() => over.style.display = 'none', 300);
            }
        }

        // Particle System Restored
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 6 + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            container.appendChild(p);
        }

        updateTutorial();
    </script>
</body>
</html>
