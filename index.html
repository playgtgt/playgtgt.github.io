<!DOCTYPE html>
<html lang="en">
<head>
    <title>GTGT | Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap');

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('background.png') no-repeat center center fixed; 
            background-size: cover; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(0, -10px, 0); } }
        @keyframes goldGlow { 0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4)); } 50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); } }
        @keyframes drift { from { transform: translateY(0); opacity: 0; } 15% { opacity: 0.4; } 100% { transform: translateY(-110vh); opacity: 0; } }

        .box { 
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 215, 0, 0.3); padding: 35px; border-radius: 40px; 
            width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); animation: float 6s ease-in-out infinite;
        }

        .live-counter {
            font-family: 'Fredoka One', cursive; font-size: 0.85rem; margin-bottom: -5px;
            background: linear-gradient(to bottom, #fff700, #ffcc00); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.3)); 
            letter-spacing: 2px; text-transform: uppercase;
        }

        h1 { font-family: 'Fredoka One', cursive; font-size: 5rem; margin: 0; background: linear-gradient(to bottom, #fff700, #ff9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: goldGlow 3s ease-in-out infinite; line-height: 1; }
        
        /* --- Bot-Linked Shop --- */
        .shop-container { margin: 20px 0; background: rgba(0, 0, 0, 0.3); border-radius: 25px; padding: 15px; border: 1px solid rgba(255, 215, 0, 0.2); }
        .shop-header { font-family: 'Fredoka One'; color: #ffd700; font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; }
        
        .payment-methods { font-size: 0.6rem; color: #888; margin-bottom: 12px; display: flex; justify-content: center; gap: 8px; }
        .payment-methods span { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }

        .tos-container { font-size: 0.65rem; color: rgba(255,255,255,0.6); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; }
        .tos-container input { cursor: pointer; accent-color: #ffd700; }

        .shop-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 215, 0, 0.05); padding: 12px 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255, 215, 0, 0.1); transition: 0.3s; }
        .item-info { text-align: left; }
        .item-name { font-weight: 600; font-size: 0.85rem; color: #fff; display: block; }
        
        .buy-btn { background: #444; color: #888; padding: 6px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; text-decoration: none; pointer-events: none; transition: 0.3s; }
        .unlocked .buy-btn { background: #ffd700; color: #000; pointer-events: auto; }
        .unlocked .buy-btn.vip { background: #a333ff; color: #fff; }
        .unlocked .buy-btn:hover { transform: scale(1.08); filter: brightness(1.1); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; text-decoration: none; border-radius: 20px; font-weight: 600; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-tutorial { background: rgba(255, 215, 0, 0.1); border: 1px solid #ffd700; color: #ffd700; }

        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; bottom: -20px; background: rgba(255, 215, 0, 0.3); border-radius: 50%; animation: drift linear infinite; }
    </style>
</head>
<body>
    <div class="particles" id="particle-container"></div>

    <div class="box">
        <div class="live-counter" id="playerCountText">PLAYERS ONLINE: FETCHING...</div>
        <h1>GTGT</h1>
        
        <div class="shop-container" id="shop">
            <div class="shop-header">✨ Exclusive Shop ✨</div>
            <div class="payment-methods">
                <span>PayPal</span> <span>Apple Pay</span> <span>Cards</span>
            </div>
            
            <div class="tos-container">
                <input type="checkbox" id="tosCheck" onchange="toggleShop()">
                <label for="tosCheck">I agree that all sales are non-refundable.</label>
            </div>
            
            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">5x Blue Gem Locks</span>
                </div>
                <a href="https://discord.com/users/1477796652181098516" target="_blank" class="buy-btn">$4.99</a>
            </div>

            <div class="shop-item" style="border-color: #a333ff; background: rgba(163, 51, 255, 0.1);">
                <div class="item-info">
                    <span class="item-name" style="color: #d199ff;">👑 VIP RANK</span>
                </div>
                <a href="https://discord.com/channels/1388213237023244449/1388280631594717184" target="_blank" class="buy-btn vip">$9.99</a>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://discord.gg/qkaVBCUrna" target="_blank" class="btn btn-discord">Discord</a>
            <button class="btn btn-tutorial">How to Join</button>
        </div>
    </div>

    <script>
        const discordID = '1388213237023244449';

        // Unlock shop function
        function toggleShop() {
            const isChecked = document.getElementById('tosCheck').checked;
            const shop = document.getElementById('shop');
            isChecked ? shop.classList.add('unlocked') : shop.classList.remove('unlocked');
        }

        // Reverted Player Count Logic (Discord Member Widget)
        async function updatePlayerCount() {
            const counterElement = document.getElementById('playerCountText');
            try {
                const response = await fetch(`https://discord.com/api/guilds/${discordID}/widget.json`);
                const data = await response.json();
                if (data && data.presence_count !== undefined) {
                    counterElement.innerText = `PLAYERS ONLINE: ${data.presence_count}`;
                } else {
                    counterElement.innerText = `PLAYERS ONLINE: 0`;
                }
            } catch (error) {
                counterElement.innerText = `PLAYERS ONLINE: ONLINE`;
            }
        }

        // Init Particles
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            container.appendChild(p);
        }

        updatePlayerCount();
        setInterval(updatePlayerCount, 30000);
    </script>
</body>
</html>
